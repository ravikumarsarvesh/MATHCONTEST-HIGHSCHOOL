<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Feature Graphic — MathArena</title>
<style>
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 30px; min-height: 100vh; margin: 0; }
  h1 { color: #FFD700; margin-bottom: 4px; }
  p.sub { color: #a0aec0; font-size: .85rem; margin-bottom: 20px; }
  .specs { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
  .spec { background: #1e2a45; padding: 6px 14px; border-radius: 8px; font-size: .78rem; }
  .spec strong { color: #4CAF50; }
  .preview { margin: 10px 0; overflow-x: auto; max-width: 100%; }
  canvas { border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,.5); display: block; }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
  .btn { background: #e94560; color: #fff; font-weight: 700; border: none; cursor: pointer; padding: 12px 24px; border-radius: 10px; font-size: .95rem; transition: .2s; }
  .btn:hover { opacity: .85; }
  .btn-alt { background: #0f3460; }
  .info { margin-top: 14px; font-size: .8rem; color: #a0aec0; text-align: center; max-width: 600px; }
</style>
</head>
<body>

<h1>🎨 Feature Graphic Generator</h1>
<p class="sub">Google Play Store — 1024 × 500 px</p>

<div class="specs">
  <div class="spec"><strong>✔</strong> 1024 × 500 px</div>
  <div class="spec"><strong>✔</strong> PNG</div>
  <div class="spec"><strong>✔</strong> Under 15 MB</div>
  <div class="spec"><strong>✔</strong> Google Play Ready</div>
</div>

<div class="preview">
  <canvas id="fg" width="1024" height="500"></canvas>
</div>

<div class="controls">
  <button class="btn" onclick="downloadPNG()">📥 Download PNG (1024×500)</button>
  <button class="btn btn-alt" onclick="downloadJPEG()">📥 Download JPEG</button>
</div>

<div class="info">
  Click to download. Upload directly to Google Play Console → Store Listing → Feature Graphic.
</div>

<script>
function drawFeatureGraphic(ctx) {
  var W = 1024, H = 500;

  // ── Background gradient ──
  var bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#0a1628');
  bg.addColorStop(0.4, '#111d35');
  bg.addColorStop(0.7, '#162040');
  bg.addColorStop(1, '#0d1a30');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ── Decorative grid lines ──
  ctx.strokeStyle = 'rgba(50, 100, 180, 0.06)';
  ctx.lineWidth = 1;
  for (var gx = 0; gx < W; gx += 60) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for (var gy = 0; gy < H; gy += 60) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  // ── Floating math symbols in background ──
  var symbols = [
    { t: '√x', x: 60, y: 80, s: 36 },
    { t: 'Σ', x: 920, y: 70, s: 42 },
    { t: 'x²', x: 80, y: 200, s: 30 },
    { t: 'π', x: 950, y: 200, s: 38 },
    { t: '∫', x: 40, y: 350, s: 40 },
    { t: 'a/b', x: 930, y: 350, s: 28 },
    { t: '△', x: 60, y: 440, s: 32 },
    { t: '±', x: 960, y: 440, s: 34 },
    { t: 'θ', x: 150, y: 130, s: 28 },
    { t: '∞', x: 870, y: 130, s: 30 },
    { t: 'dx', x: 140, y: 400, s: 26 },
    { t: 'n!', x: 880, y: 420, s: 28 },
    { t: 'log', x: 170, y: 300, s: 22 },
    { t: 'sin', x: 850, y: 280, s: 22 },
  ];
  ctx.globalAlpha = 0.1;
  ctx.fillStyle = '#4488cc';
  symbols.forEach(function(sym) {
    ctx.font = 'bold ' + sym.s + 'px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(sym.t, sym.x, sym.y);
  });
  ctx.globalAlpha = 1.0;

  // ── Glowing orb behind center ──
  var orb = ctx.createRadialGradient(512, 230, 20, 512, 230, 260);
  orb.addColorStop(0, 'rgba(34, 136, 221, 0.15)');
  orb.addColorStop(0.5, 'rgba(34, 136, 221, 0.05)');
  orb.addColorStop(1, 'rgba(34, 136, 221, 0)');
  ctx.fillStyle = orb;
  ctx.fillRect(0, 0, W, H);

  // ── Blue arc ──
  ctx.strokeStyle = '#2288dd';
  ctx.lineWidth = 5;
  ctx.shadowColor = '#2288dd';
  ctx.shadowBlur = 25;
  ctx.beginPath();
  ctx.arc(512, 220, 140, -Math.PI * 0.85, Math.PI * 0.05, false);
  ctx.stroke();

  ctx.strokeStyle = '#44aaff';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(512, 220, 144, -Math.PI * 0.78, -Math.PI * 0.02, false);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';

  // ── Gold "A" ──
  var goldGrad = ctx.createLinearGradient(420, 60, 600, 340);
  goldGrad.addColorStop(0, '#FFE44D');
  goldGrad.addColorStop(0.3, '#FFD700');
  goldGrad.addColorStop(0.65, '#E6A800');
  goldGrad.addColorStop(1, '#CC8800');

  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = 16;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 5;

  ctx.fillStyle = goldGrad;
  ctx.beginPath();
  ctx.moveTo(512, 50);      // top
  ctx.lineTo(380, 340);     // bottom-left outer
  ctx.lineTo(424, 340);     // bottom-left inner
  ctx.lineTo(452, 270);     // crossbar left
  ctx.lineTo(572, 270);     // crossbar right
  ctx.lineTo(600, 340);     // bottom-right inner
  ctx.lineTo(644, 340);     // bottom-right outer
  ctx.closePath();
  ctx.fill();

  // Inner triangle cutout
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  var bgInner = ctx.createRadialGradient(512, 190, 5, 512, 200, 80);
  bgInner.addColorStop(0, '#162040');
  bgInner.addColorStop(1, '#111d35');
  ctx.fillStyle = bgInner;
  ctx.beginPath();
  ctx.moveTo(512, 120);
  ctx.lineTo(462, 252);
  ctx.lineTo(562, 252);
  ctx.closePath();
  ctx.fill();

  // ── Pi symbol inside A ──
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 2;

  var piGrad = ctx.createLinearGradient(480, 150, 540, 250);
  piGrad.addColorStop(0, '#ffffff');
  piGrad.addColorStop(1, '#ccccdd');
  ctx.fillStyle = piGrad;
  ctx.font = 'italic bold 88px Georgia, "Times New Roman", serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('π', 512, 200);

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  // ── "MATH ARENA" text ──
  ctx.textBaseline = 'top';
  ctx.font = 'bold 62px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'left';

  var mathText = 'MATH ';
  var arenaText = 'PREP';
  var mathW = ctx.measureText(mathText).width;
  var arenaW = ctx.measureText(arenaText).width;
  var totalW = mathW + arenaW;
  var textX = 512 - totalW / 2;

  // Text shadow
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 3;

  ctx.fillStyle = '#ffffff';
  ctx.fillText(mathText, textX, 360);

  ctx.fillStyle = '#FFD700';
  ctx.fillText(arenaText, textX + mathW, 360);

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // ── Tagline ──
  ctx.fillStyle = '#7799bb';
  ctx.font = 'bold 18px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Practice Pascal, Cayley, Fermat', 512, 432);

  // ── Subtle bottom accent line ──
  var lineGrad = ctx.createLinearGradient(200, 0, 824, 0);
  lineGrad.addColorStop(0, 'rgba(34, 136, 221, 0)');
  lineGrad.addColorStop(0.3, 'rgba(34, 136, 221, 0.4)');
  lineGrad.addColorStop(0.5, 'rgba(255, 215, 0, 0.5)');
  lineGrad.addColorStop(0.7, 'rgba(34, 136, 221, 0.4)');
  lineGrad.addColorStop(1, 'rgba(34, 136, 221, 0)');
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(200, 470);
  ctx.lineTo(824, 470);
  ctx.stroke();

  // ── "Waterloo Prep" small text ──
  ctx.fillStyle = 'rgba(150, 170, 200, 0.5)';
  ctx.font = '14px "Segoe UI", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Math Arena — Waterloo Contest Prep', 512, 480);
}

// Draw on load
var canvas = document.getElementById('fg');
var ctx = canvas.getContext('2d');
drawFeatureGraphic(ctx);

function downloadPNG() {
  var link = document.createElement('a');
  link.download = 'feature-graphic-1024x500.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function downloadJPEG() {
  var link = document.createElement('a');
  link.download = 'feature-graphic-1024x500.jpg';
  link.href = canvas.toDataURL('image/jpeg', 0.95);
  link.click();
}
</script>

</body>
</html>
